server:
  port: 8080

spring:
  application:
    name: major-playground
  # LESSON: WebFlux codec limits — max in-memory buffer for request/response bodies.
  # Default is 256 KB. Without this, large responses from WebClient silently fail
  # with DataBufferLimitException. Set to -1 to disable (not recommended in prod).
  codec:
    max-in-memory-size: 5MB

# LESSON: Reactor Netty connection pool tunables exposed via properties.
# In production, these match load characteristics (peak RPS, upstream timeout SLAs).
playground:
  webclient:
    connect-timeout-ms: 2000
    response-timeout-ms: 5000
    max-connections: 100
    pending-acquire-timeout-ms: 3000

# LESSON: Reactor debug mode — adds assembly tracing to Flux/Mono so stack traces
# show WHERE a reactive chain was assembled, not just where it blew up.
# Very useful in dev, has CPU overhead — disable in production.
logging:
  level:
    com.major.playground: DEBUG
    reactor.netty: WARN
    org.springframework.web.reactive: DEBUG
